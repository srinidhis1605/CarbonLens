services:
  backend:
    build:
      context: ./backend
    container_name: carbonlens-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      FRONTEND_ORIGIN: http://localhost:3000
      DB_SSL: "true"
      DB_SSL_CA: /app/certs/ca.pem
    volumes:
      - ./backend/certs/ca.pem:/app/certs/ca.pem:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: carbonlens-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
